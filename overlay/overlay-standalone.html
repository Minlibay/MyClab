<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreamTitles Overlay</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: transparent;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
    }

    #overlay {
      width: 100vw;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 20px;
    }

    .title-block {
      animation: fadeIn 0.2s ease-in;
      margin-bottom: 8px;
      transition: opacity 0.5s;
    }

    .title-line {
      background: rgba(0, 0, 0, 0.7);
      color: #ffffff;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 18px;
      line-height: 1.4;
      max-width: 80%;
      word-wrap: break-word;
    }

    .title-line.original {
      background: rgba(50, 50, 50, 0.6);
      color: #aaaaaa;
      font-size: 16px;
      margin-bottom: 4px;
    }

    .title-line.translated {
      background: rgba(0, 100, 255, 0.7);
      color: #ffffff;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .empty {
      text-align: center;
      color: rgba(255, 255, 255, 0.3);
      font-size: 14px;
      padding: 20px;
    }
  </style>
</head>
<body>
  <div id="overlay">
    <div class="empty">Ожидание речи...</div>
  </div>

  <script>
    const overlay = document.getElementById('overlay');
    let titles = [];
    let currentLine = null;
    const MAX_TITLES = 3;
    const FADE_DELAY = 5000;

    // Connect via WebSocket
    const ws = new WebSocket('ws://localhost:7890');

    ws.onmessage = (event) => {
      try {
        const data = JSON.parse(event.data);
        handleTitle(data);
      } catch (e) {
        console.error('Parse error:', e);
      }
    };

    ws.onopen = () => console.log('Connected to overlay server');
    ws.onclose = () => console.log('Disconnected from overlay server');

    function handleTitle(data) {
      const { original, translated, isInterim } = data;

      if (isInterim) {
        if (!currentLine) {
          currentLine = createTitleLine();
        }
        currentLine.querySelector('.original').textContent = original + ' ...';
        currentLine.querySelector('.translated').textContent = 'перевожу...';
        return;
      }

      if (currentLine) {
        currentLine.classList.add('final');
        currentLine.querySelector('.original').textContent = original;
        currentLine.querySelector('.translated').textContent = translated;
        titles.push({ el: currentLine, timestamp: Date.now() });
        currentLine = null;
      } else {
        const line = createTitleLine();
        line.querySelector('.original').textContent = original;
        line.querySelector('.translated').textContent = translated;
        titles.push({ el: line, timestamp: Date.now() });
      }

      while (titles.length > MAX_TITLES) {
        const old = titles.shift();
        old.el.style.opacity = '0';
        setTimeout(() => old.el.remove(), 300);
      }
    }

    function createTitleLine() {
      const div = document.createElement('div');
      div.className = 'title-block';
      div.innerHTML = `
        <div class="title-line original"></div>
        <div class="title-line translated"></div>
      `;
      overlay.appendChild(div);
      const empty = overlay.querySelector('.empty');
      if (empty) empty.remove();
      return div;
    }

    // Auto-hide titles after delay
    setInterval(() => {
      const now = Date.now();
      titles = titles.filter((t) => {
        if (now - t.timestamp > FADE_DELAY) {
          t.el.style.transition = 'opacity 0.5s';
          t.el.style.opacity = '0';
          setTimeout(() => t.el.remove(), 500);
          return false;
        }
        return true;
      });
    }, 1000);
  </script>
</body>
</html>
